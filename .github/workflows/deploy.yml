name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'helm-hello/app/**'

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: hello-aws
  AWS_ACCOUNT_ID: "266859253727"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG helm-hello/app/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update image tag in values file
      env:
        IMAGE_TAG: ${{ github.sha }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        sed -i "s|repository:.*|repository: $ECR_REGISTRY/$ECR_REPOSITORY|" helm-hello/values-default.yaml
        sed -i "s|tag:.*|tag: \"$IMAGE_TAG\"|" helm-hello/values-default.yaml
        cat helm-hello/values-default.yaml

    - name: Commit and push updated values
      run: |
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        git add helm-hello/values-default.yaml
        git diff --staged --quiet || git commit -m "CI: update image tag to ${{ github.sha }}"
        git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/saurabhban/argocd.git HEAD:main
